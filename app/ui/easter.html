<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>the end</title>
<link rel="icon" href="/img/logo.png" type="image/png">
<style>
* { box-sizing: border-box; }
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Courier New', 'MS Gothic', monospace;
}

/* ========== 幻觉/玻璃碎裂主背景 ========== */
body {
    background: #0a0020;
    position: relative;
    cursor: crosshair;
}

/* 底层：多层蒸汽波径向渐变（粉蓝幻觉色） */
.bg-vapor {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(ellipse at 20% 30%, rgba(255, 0, 170, 0.55) 0%, transparent 45%),
        radial-gradient(ellipse at 80% 70%, rgba(0, 240, 255, 0.45) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 20%, rgba(255, 238, 0, 0.25) 0%, transparent 35%),
        radial-gradient(ellipse at 15% 80%, rgba(170, 0, 255, 0.45) 0%, transparent 40%),
        linear-gradient(180deg, #1a0040 0%, #2a0055 30%, #1a0030 100%);
    background-size: 200% 200%;
    animation: vaporShift 12s ease-in-out infinite;
    z-index: 1;
}
@keyframes vaporShift {
    0%, 100% { background-position: 0% 0%, 100% 100%, 50% 0%, 0% 100%, 0 0; }
    50% { background-position: 100% 50%, 0% 50%, 50% 100%, 100% 0%, 0 0; }
}

/* 玻璃碎裂层（纯 CSS 三角形碎片） */
.shards {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
}
.shard {
    position: absolute;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    opacity: 0.55;
    mix-blend-mode: screen;
    animation: shardFloat 6s ease-in-out infinite;
}
.shard.s1 {
    top: 5%; left: 8%;
    width: 120px; height: 100px;
    background: linear-gradient(135deg, #ff00aa, #ffee00);
    transform: rotate(-18deg);
    animation-delay: 0s;
}
.shard.s2 {
    top: 68%; left: 14%;
    width: 90px; height: 80px;
    background: linear-gradient(45deg, #00f0ff, #ff00aa);
    transform: rotate(42deg);
    animation-delay: 1.2s;
}
.shard.s3 {
    top: 18%; right: 10%;
    width: 140px; height: 110px;
    background: linear-gradient(90deg, #ff00ff, #00f0ff);
    transform: rotate(112deg);
    animation-delay: 0.6s;
}
.shard.s4 {
    top: 72%; right: 16%;
    width: 100px; height: 90px;
    background: linear-gradient(60deg, #ffee00, #ff00aa);
    transform: rotate(-52deg);
    animation-delay: 2.1s;
}
.shard.s5 {
    top: 40%; left: 42%;
    width: 70px; height: 60px;
    background: linear-gradient(135deg, #00f0ff, #aa00ff);
    transform: rotate(78deg);
    animation-delay: 1.8s;
    opacity: 0.35;
}
@keyframes shardFloat {
    0%, 100% { transform: rotate(var(--rot, 0deg)) translateY(0) scale(1); opacity: 0.45; }
    50% { transform: rotate(var(--rot, 0deg)) translateY(-15px) scale(1.06); opacity: 0.75; }
}

/* 玻璃裂纹（细线 SVG 叠加） */
.cracks {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
    opacity: 0.55;
}

/* 故障横条（错位/闪烁） */
.glitch-bar {
    position: absolute;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg,
        transparent,
        rgba(255, 0, 170, 0.7),
        rgba(0, 240, 255, 0.7),
        rgba(255, 238, 0, 0.5),
        transparent);
    z-index: 4;
    animation: glitchPass 2.8s linear infinite;
}
@keyframes glitchPass {
    0% { transform: translateY(-10px); opacity: 0; }
    10% { opacity: 0.9; }
    50% { transform: translateY(50vh); opacity: 1; }
    90% { opacity: 0.9; }
    100% { transform: translateY(110vh); opacity: 0; }
}

/* 竖线故障条纹（模仿参考图的彩色竖条） */
.vertical-lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
}
.v-line {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    opacity: 0.45;
}
.v-line.v1 { left: 5%;  background: linear-gradient(180deg, transparent, #ff00aa, #ffee00, #ff00aa, transparent); animation: vFlash1 3.2s infinite; }
.v-line.v2 { left: 18%; background: linear-gradient(180deg, transparent, #00f0ff, #ff00aa, #00f0ff, transparent); animation: vFlash2 2.6s infinite; }
.v-line.v3 { left: 32%; background: linear-gradient(180deg, transparent, #ffee00, #ff00aa, transparent); width: 1px; animation: vFlash1 4.1s infinite; }
.v-line.v4 { left: 48%; background: linear-gradient(180deg, transparent, #ff00ff, #00f0ff, transparent); animation: vFlash2 3.8s infinite; }
.v-line.v5 { left: 62%; background: linear-gradient(180deg, transparent, #ff00aa, #ffee00, transparent); width: 3px; animation: vFlash1 2.9s infinite; }
.v-line.v6 { left: 76%; background: linear-gradient(180deg, transparent, #00f0ff, #ff00ff, transparent); animation: vFlash2 3.5s infinite; }
.v-line.v7 { left: 88%; background: linear-gradient(180deg, transparent, #ffee00, #ff00aa, #00f0ff, transparent); width: 1px; animation: vFlash1 4.3s infinite; }
.v-line.v8 { left: 94%; background: linear-gradient(180deg, transparent, #ff00aa, transparent); animation: vFlash2 3.1s infinite; }

@keyframes vFlash1 {
    0%, 100% { opacity: 0.15; height: 100%; }
    30% { opacity: 0.85; height: 60%; top: 10%; }
    60% { opacity: 0.35; height: 80%; top: 5%; }
}
@keyframes vFlash2 {
    0%, 100% { opacity: 0.25; height: 100%; }
    40% { opacity: 0.9; height: 50%; top: 30%; }
    70% { opacity: 0.4; height: 75%; top: 15%; }
}

/* 噪点扫描线 */
.scanlines::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.04) 0px,
        rgba(255, 255, 255, 0.04) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
    z-index: 5;
}

/* 噪点颗粒层 */
.noise::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.03) 1px, transparent 2px),
        radial-gradient(circle at 30% 70%, rgba(255,255,255,0.02) 1px, transparent 2px),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,0.03) 1px, transparent 2px),
        radial-gradient(circle at 90% 80%, rgba(255,255,255,0.02) 1px, transparent 2px);
    background-size: 30px 30px, 50px 50px, 40px 40px, 35px 35px;
    pointer-events: none;
    z-index: 5;
    animation: noiseShift 0.5s steps(3) infinite;
}
@keyframes noiseShift {
    0% { background-position: 0 0, 0 0, 0 0, 0 0; }
    33% { background-position: 5px 5px, -5px 5px, 5px -5px, -5px -5px; }
    66% { background-position: -5px 5px, 5px -5px, -5px -5px, 5px 5px; }
}

/* 背景文字（重复 THE END / IMMEDIATELY — 幻觉感） */
.bg-text {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier New', 'MS Gothic', monospace;
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 12px;
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
    z-index: 2;
}
.bg-text.t-end {
    top: 10%;
    color: rgba(255, 255, 255, 0.18);
    text-shadow:
        3px 0 rgba(255, 0, 170, 0.5),
        -3px 0 rgba(0, 240, 255, 0.5),
        0 3px rgba(255, 238, 0, 0.3);
    animation: textGlitch 3.5s infinite;
}
.bg-text.t-imm {
    top: 24%;
    font-size: 36px;
    letter-spacing: 8px;
    color: rgba(0, 240, 255, 0.13);
    animation: textGlitch 4.2s infinite;
}
.bg-text.t-imm2 {
    top: 78%;
    font-size: 28px;
    letter-spacing: 10px;
    color: rgba(255, 0, 170, 0.14);
    animation: textGlitch 3.1s infinite;
}
.bg-text.t-dosage {
    top: 86%;
    font-size: 22px;
    letter-spacing: 8px;
    color: rgba(255, 255, 255, 0.15);
    text-transform: uppercase;
    animation: textGlitch 4.8s infinite;
}
@keyframes textGlitch {
    0%, 100% { transform: translateX(-50%) skewX(0deg); opacity: 0.2; }
    20% { transform: translateX(-52%) skewX(1.5deg); opacity: 0.35; }
    40% { transform: translateX(-48%) skewX(-1deg); opacity: 0.15; }
    60% { transform: translateX(-51%) skewX(2deg); opacity: 0.4; }
    80% { transform: translateX(-49%) skewX(-1.5deg); opacity: 0.25; }
}

/* 玻璃碎裂裂纹 SVG 容器 */
.crack-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
    opacity: 0.45;
}

/* ========== Windows 经典弹窗 ========== */
.dialog-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
}

.dialog {
    background: #e8d8ff;
    border: 3px solid #8833cc;
    box-shadow:
        0 0 0 2px #ffffff,
        6px 6px 0 rgba(0, 0, 0, 0.5),
        0 0 40px rgba(255, 0, 170, 0.7),
        0 0 80px rgba(0, 240, 255, 0.4);
    min-width: 540px;
    max-width: 680px;
    padding: 0;
    animation: dialogAppear 1s ease-out;
}

@keyframes dialogAppear {
    0% { opacity: 0; transform: scale(0.92); filter: blur(6px); }
    60% { opacity: 1; transform: scale(1.03); filter: blur(0); }
    100% { transform: scale(1); }
}

/* 标题栏 */
.dialog-titlebar {
    background: linear-gradient(90deg, #aa0055 0%, #5500aa 50%, #aa0055 100%);
    color: #ffffff;
    padding: 6px 10px;
    font-family: 'Courier New', 'MS Gothic', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    font-weight: bold;
    text-shadow: 1px 1px 0 #000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #8833cc;
}
.dialog-title {
    font-size: 12px;
    letter-spacing: 2px;
    padding-left: 4px;
}
.dialog-title-controls {
    display: flex;
    gap: 4px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: bold;
}
.dialog-title-controls span {
    background: #e8d8ff;
    color: #5500aa;
    padding: 1px 6px;
    border: 1px solid #5500aa;
    cursor: pointer;
}

/* 弹窗内容 */
.dialog-body {
    padding: 28px 36px 20px 36px;
    background: linear-gradient(180deg, #f3e0ff 0%, #e0bfff 100%);
    position: relative;
}

.dialog-text {
    font-family: 'Courier New', 'MS Gothic', monospace;
    font-size: 16px;
    line-height: 1.9;
    color: #440066;
    text-align: center;
    letter-spacing: 1px;
    text-shadow:
        0 0 1px rgba(255, 0, 170, 0.3),
        1px 1px 0 rgba(255, 255, 255, 0.5);
    margin: 0 0 24px 0;
    padding: 10px;
    position: relative;
}
.dialog-text::before,
.dialog-text::after {
    content: '';
    position: absolute;
    left: 20%;
    right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #aa00aa, transparent);
}
.dialog-text::before { top: 0; }
.dialog-text::after { bottom: 0; }
.dialog-text .pink { color: #ff00aa; text-shadow: 0 0 2px #ff00aa; font-weight: bold; }
.dialog-text .blue { color: #0088cc; text-shadow: 0 0 2px #00f0ff; font-weight: bold; }

/* OK 按钮 */
.dialog-btn-row {
    text-align: center;
    padding: 8px 0 16px 0;
}
.ok-btn {
    font-family: 'Courier New', 'MS Gothic', monospace;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 4px;
    padding: 6px 36px;
    background: linear-gradient(180deg, #f3e0ff 0%, #cc99ff 100%);
    color: #440066;
    border: 2px solid #8833cc;
    box-shadow:
        inset 1px 1px 0 #ffffff,
        inset -1px -1px 0 #8833cc,
        3px 3px 0 rgba(0, 0, 0, 0.3);
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
}
.ok-btn:hover {
    background: linear-gradient(180deg, #ffffff 0%, #ff99cc 100%);
    color: #aa0055;
}
.ok-btn:active {
    transform: translate(2px, 2px);
    box-shadow:
        inset 1px 1px 0 #ffffff,
        inset -1px -1px 0 #8833cc,
        1px 1px 0 rgba(0, 0, 0, 0.3);
}

/* ========== 角落唱片机（迷你） ========== */
.corner-tt {
    position: fixed;
    right: 18px;
    bottom: 30px;
    z-index: 999;
    background: rgba(20, 0, 40, 0.75);
    border: 2px solid #ff00aa;
    border-radius: 8px;
    padding: 8px 10px 6px 10px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 0, 170, 0.6);
    text-align: center;
    transition: transform 0.2s;
}
.corner-tt:hover { transform: scale(1.08); }
.corner-tt:active { transform: scale(0.92); }
.corner-tt svg {
    transition: filter 0.3s;
}
.corner-tt.playing svg {
    animation: spinMini 4s linear infinite;
    filter: drop-shadow(0 0 4px #ff00aa);
}
.corner-tt.paused svg {
    filter: grayscale(0.7) brightness(0.5);
}
@keyframes spinMini {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
.corner-tt .tt-status {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: #ff88cc;
    letter-spacing: 1px;
    margin-top: 3px;
    text-shadow: 0 0 2px #ff00aa;
}
</style>
</head>
<body class="scanlines noise">

<!-- 幻觉蒸汽波底 -->
<div class="bg-vapor"></div>

<!-- 背景幻觉文字 -->
<div class="bg-text t-end">T H E &nbsp; E N D</div>
<div class="bg-text t-imm">I M M E D I A T E L Y</div>
<div class="bg-text t-imm2">♡ T H E &nbsp; E N D ♡</div>
<div class="bg-text t-dosage">please take only the recommended internet dosage</div>

<!-- 竖线故障条纹 -->
<div class="vertical-lines">
    <div class="v-line v1"></div>
    <div class="v-line v2"></div>
    <div class="v-line v3"></div>
    <div class="v-line v4"></div>
    <div class="v-line v5"></div>
    <div class="v-line v6"></div>
    <div class="v-line v7"></div>
    <div class="v-line v8"></div>
</div>

<!-- 玻璃碎片 -->
<div class="shards">
    <div class="shard s1" style="--rot: -18deg;"></div>
    <div class="shard s2" style="--rot: 42deg;"></div>
    <div class="shard s3" style="--rot: 112deg;"></div>
    <div class="shard s4" style="--rot: -52deg;"></div>
    <div class="shard s5" style="--rot: 78deg;"></div>
</div>

<!-- 玻璃裂纹 SVG -->
<svg class="crack-svg" viewBox="0 0 1000 700" preserveAspectRatio="none">
    <!-- 从左上发散的裂纹 -->
    <g stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.35">
        <path d="M 200,50 L 220,150 L 180,280 L 250,420 L 220,550"/>
        <path d="M 220,150 L 320,180 L 410,220 L 500,300"/>
        <path d="M 180,280 L 100,320 L 50,450"/>
        <path d="M 180,280 L 280,330"/>
        <path d="M 250,420 L 340,460 L 380,550"/>
        <path d="M 220,550 L 180,650"/>
        <path d="M 220,550 L 300,620"/>
    </g>
    <!-- 从右上发散 -->
    <g stroke="#00f0ff" stroke-width="0.6" fill="none" opacity="0.3">
        <path d="M 820,80 L 780,200 L 830,330 L 760,480 L 810,600"/>
        <path d="M 780,200 L 680,230 L 600,280"/>
        <path d="M 830,330 L 920,350 L 970,450"/>
        <path d="M 760,480 L 680,500"/>
        <path d="M 810,600 L 750,660"/>
        <path d="M 810,600 L 900,640"/>
    </g>
    <!-- 从下方中间发散 -->
    <g stroke="#ff00aa" stroke-width="0.5" fill="none" opacity="0.35">
        <path d="M 500,680 L 480,580 L 540,460 L 460,340 L 520,220"/>
        <path d="M 480,580 L 400,540 L 340,460"/>
        <path d="M 540,460 L 620,420"/>
        <path d="M 460,340 L 380,280"/>
        <path d="M 520,220 L 560,120"/>
        <path d="M 520,220 L 440,160"/>
    </g>
    <!-- 中间区域的交叉裂纹（玻璃碎裂感） -->
    <g stroke="#ffee00" stroke-width="0.3" fill="none" opacity="0.25">
        <path d="M 350,250 L 450,300 L 550,280"/>
        <path d="M 450,300 L 470,400 L 500,500"/>
        <path d="M 470,400 L 400,450"/>
        <path d="M 470,400 L 560,420"/>
    </g>
    <!-- 随机的细小碎裂纹 -->
    <g stroke="#ffffff" stroke-width="0.3" fill="none" opacity="0.25">
        <path d="M 120,380 L 150,420 L 140,470"/>
        <path d="M 880,280 L 910,330 L 890,390"/>
        <path d="M 600,100 L 620,150 L 580,180"/>
        <path d="M 250,650 L 290,680 L 280,700"/>
        <path d="M 720,640 L 760,680"/>
    </g>
</svg>

<!-- 横向故障条 -->
<div class="glitch-bar" style="animation-delay: 0s;"></div>
<div class="glitch-bar" style="animation-delay: 1.2s; top: 20%;"></div>
<div class="glitch-bar" style="animation-delay: 2.5s; top: 60%;"></div>

<!-- 核心 Windows 弹窗 -->
<div class="dialog-wrapper">
    <div class="dialog">
        <div class="dialog-titlebar">
            <span class="dialog-title">♡ the end ♡</span>
            <span class="dialog-title-controls">
                <span>_</span>
                <span>▢</span>
                <span onclick="goBack();">✕</span>
            </span>
        </div>
        <div class="dialog-body">
            <p class="dialog-text">
                我找不到<span class="pink">幸福</span>，<br>
                但是我希望你<span class="blue">幸福</span>，<br>
                我将前往<span class="pink">天国的列车</span>，<br>
                希望你能<span class="blue">忘记我</span>。
            </p>
            <div class="dialog-btn-row">
                <button class="ok-btn" onclick="goBack();">OK</button>
            </div>
        </div>
    </div>
</div>

<!-- 背景音乐（end.mp3） -->
<audio id="end-audio" src="/audio/end.mp3" loop></audio>

<!-- 角落迷你唱片机 -->
<div id="corner-tt" class="corner-tt playing" onclick="toggleEasterMusic();" title="点击播放/停止音乐">
    <svg viewBox="0 0 100 100" width="42" height="42">
        <circle cx="50" cy="50" r="46" fill="#220033" stroke="#ff00aa" stroke-width="3"/>
        <circle cx="50" cy="50" r="30" fill="none" stroke="#660055" stroke-width="1"/>
        <circle cx="50" cy="50" r="18" fill="none" stroke="#660055" stroke-width="1"/>
        <circle cx="50" cy="50" r="8" fill="#ff00aa"/>
        <circle cx="50" cy="50" r="3" fill="#ffee00"/>
        <g transform="translate(50,50) rotate(25)">
            <line x1="0" y1="0" x2="36" y2="0" stroke="#cccccc" stroke-width="3"/>
            <circle cx="36" cy="0" r="3" fill="#00f0ff"/>
        </g>
    </svg>
    <div class="tt-status" id="tt-status">♪ playing</div>
</div>

<script>
function _startEasterMusic() {
    const audio = document.getElementById('end-audio');
    const tt = document.getElementById('corner-tt');
    const status = document.getElementById('tt-status');
    if (!audio) return;
    audio.volume = 0.6;
    audio.play().then(function () {
        tt.classList.add('playing');
        tt.classList.remove('paused');
        status.innerText = '♪ playing';
    }).catch(function () {
        tt.classList.add('paused');
        tt.classList.remove('playing');
        status.innerText = '▶ click';
    });
}
function toggleEasterMusic() {
    const audio = document.getElementById('end-audio');
    const tt = document.getElementById('corner-tt');
    const status = document.getElementById('tt-status');
    if (!audio) return;
    if (audio.paused) {
        audio.play().then(function () {
            tt.classList.add('playing');
            tt.classList.remove('paused');
            status.innerText = '♪ playing';
        }).catch(function () {
            status.innerText = '⚠ blocked';
        });
    } else {
        audio.pause();
        tt.classList.add('paused');
        tt.classList.remove('playing');
        status.innerText = '⏸ stopped';
    }
}
function goBack() {
    window.location.href = '/';
}
_startEasterMusic();

// 随机触发的全屏故障闪烁（增强幻觉感）
setInterval(function() {
    if (Math.random() < 0.18) {
        document.body.style.filter = 'hue-rotate(' + (Math.random() * 40 - 20) + 'deg) saturate(1.4)';
        setTimeout(function() {
            document.body.style.filter = '';
        }, 120 + Math.random() * 200);
    }
}, 900);
</script>

</body>
</html>
